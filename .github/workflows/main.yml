name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        device: [a51, m31]
        clang_ver: ['19.1.5', '18.1.8']
    name: "Build for ${{matrix.device}} (${{matrix.build_type}})"
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 1
          submodules: recursive
          
      - name: Install WeebX Clang
        run: |
          wget https://github.com/XSans0/WeebX-Clang/releases/download/WeebX-Clang-${{matrix.clang_ver}}-release/WeebX-Clang-${{matrix.clang_ver}}.tar.gz -O "weebx-clang.tar.gz"
          rm -rf toolchain && mkdir toolchain && tar -xvf weebx-clang.tar.gz -C toolchain && rm -rf weebx-clang.tar.gz
          
      - name: Build
        run: python build_kernel.py --oneui --target=${{matrix.device}}

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@main
        with:
          name: GrassKernel_${{matrix.device}}_OneUI_Clang${{matrix.clang_ver}}
          path: "Grass*"
          if-no-files-found: error

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: GrassKernel_${{matrix.device}}_OneUI_Clang${{matrix.clang_ver}}-LOG
          path: "*.log"
          if-no-files-found: warn
